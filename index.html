<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Recipe Box</title>
  <style>
    :root {
      --bg: #faf8f5;
      --card: #ffffff;
      --ink: #2b2b2b;
      --muted: #8a847c;
      --accent: #c4622d;
      --line: #ece7e0;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ---- Password gate ---- */
    #gate {
      position: fixed; inset: 0; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
    }
    #gate form {
      width: 100%; max-width: 320px; padding: 24px; text-align: center;
    }
    #gate h1 { font-size: 22px; margin: 0 0 4px; }
    #gate p { color: var(--muted); margin: 0 0 20px; font-size: 14px; }
    #gate input {
      width: 100%; padding: 12px 14px; font-size: 16px;
      border: 1px solid var(--line); border-radius: 10px; background: #fff;
    }
    #gate button {
      width: 100%; margin-top: 12px; padding: 12px; font-size: 16px;
      background: var(--accent); color: #fff; border: 0; border-radius: 10px;
      cursor: pointer;
    }
    #gate .err { color: #c0392b; font-size: 13px; min-height: 18px; margin-top: 10px; }

    /* ---- App ---- */
    #app { display: none; max-width: 760px; margin: 0 auto; padding: 28px 18px 80px; }
    header.top { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 18px; }
    header.top h1 { font-size: 26px; margin: 0; }
    header.top .count { color: var(--muted); font-size: 14px; white-space: nowrap; }

    .search {
      position: sticky; top: 0; z-index: 2; padding: 10px 0 14px; background: var(--bg);
    }
    .search input {
      width: 100%; padding: 13px 16px; font-size: 16px;
      border: 1px solid var(--line); border-radius: 12px; background: #fff;
    }

    ul.recipes { list-style: none; margin: 0; padding: 0; display: grid; gap: 12px; }
    li.recipe {
      background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
      padding: 16px 18px;
    }
    li.recipe .title { font-size: 18px; font-weight: 600; line-height: 1.3; }
    li.recipe .meta { color: var(--muted); font-size: 13px; margin-top: 4px; }
    li.recipe .meta .dot { margin: 0 6px; }
    li.recipe .note { margin-top: 10px; font-size: 15px; color: #444; }
    li.recipe .note.empty { display: none; }

    .empty-state, .loading { text-align: center; color: var(--muted); padding: 50px 10px; }
    mark { background: #ffe9a8; padding: 0 1px; border-radius: 2px; }
  </style>
</head>
<body>
  <!-- ============ PASSWORD GATE ============ -->
  <div id="gate">
    <form id="gate-form">
      <h1>🍳 Recipe Box</h1>
      <p>Enter the password to continue.</p>
      <input id="gate-input" type="password" autocomplete="current-password" autofocus placeholder="Password" />
      <button type="submit">Unlock</button>
      <div class="err" id="gate-err"></div>
    </form>
  </div>

  <!-- ============ APP ============ -->
  <div id="app">
    <header class="top">
      <h1>🍳 Recipe Box</h1>
      <span class="count" id="count"></span>
    </header>
    <div class="search">
      <input id="search" type="search" placeholder="Search recipes, notes, sites…" autocomplete="off" />
    </div>
    <div class="loading" id="loading">Loading recipes…</div>
    <ul class="recipes" id="list"></ul>
    <div class="empty-state" id="empty" style="display:none"></div>
  </div>

  <script>
    // ======================= CONFIG =======================
    // Where the recipe data lives (same repo, served by GitHub Pages).
    const RECIPES_URL = './recipes.json';

    // SHA-256 hash of your password. This is NOT real security — anyone can read
    // this file's source — it just keeps the page out of casual view.
    // The value below is sha256("recipes"). CHANGE IT: pick your own password and
    // generate its hash by opening any browser's dev console and running:
    //   crypto.subtle.digest('SHA-256', new TextEncoder().encode('YOUR_PASSWORD'))
    //     .then(b => console.log([...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')))
    // then paste the printed string here.
    const PASSWORD_HASH = '63b8bd59a482879ad0634d60f0a6e4998c84523f0a3b8927d7786f23cafa4cec';
    // ======================================================

    const $ = (id) => document.getElementById(id);

    async function sha256Hex(text) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
      return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // ---- Gate ----
    const EXPECTED_HASH = PASSWORD_HASH;

    function unlock() {
      $('gate').style.display = 'none';
      $('app').style.display = 'block';
      $('search').focus();
      loadRecipes();
    }

    if (sessionStorage.getItem('rb_unlocked') === '1') {
      unlock();
    }

    $('gate-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const hash = await sha256Hex($('gate-input').value);
      if (hash === EXPECTED_HASH) {
        sessionStorage.setItem('rb_unlocked', '1');
        unlock();
      } else {
        $('gate-err').textContent = 'Wrong password.';
        $('gate-input').select();
      }
    });

    // ---- Data + rendering ----
    let allRecipes = [];

    async function loadRecipes() {
      try {
        const res = await fetch(RECIPES_URL + '?t=' + Date.now());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        allRecipes = Array.isArray(data) ? data : [];
        allRecipes.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
      } catch (err) {
        allRecipes = [];
        $('loading').textContent = 'Could not load recipes.json (' + err.message + ').';
        return;
      }
      $('loading').style.display = 'none';
      render('');
    }

    function fmtDate(iso) {
      const d = new Date(iso);
      if (isNaN(d)) return '';
      return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function escapeHtml(s) {
      return (s || '').replace(/[&<>"']/g, c => (
        { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
      ));
    }

    function highlight(text, q) {
      const safe = escapeHtml(text);
      if (!q) return safe;
      const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'ig');
      return safe.replace(re, '<mark>$1</mark>');
    }

    function render(query) {
      const q = query.trim().toLowerCase();
      const list = $('list');
      const matches = allRecipes.filter(r => {
        if (!q) return true;
        return [r.title, r.note, r.site, r.from].some(f => (f || '').toLowerCase().includes(q));
      });

      $('count').textContent = allRecipes.length
        ? (q ? matches.length + ' of ' + allRecipes.length : allRecipes.length + ' recipes')
        : '';

      list.innerHTML = matches.map(r => `
        <li class="recipe">
          <div class="title"><a href="${escapeHtml(r.url)}" target="_blank" rel="noopener noreferrer">${highlight(r.title || r.url, q)}</a></div>
          <div class="meta">${highlight(r.site || '', q)}${r.site && r.date ? '<span class="dot">·</span>' : ''}${fmtDate(r.date)}${r.from ? '<span class="dot">·</span>from ' + highlight(r.from, q) : ''}</div>
          <div class="note ${r.note ? '' : 'empty'}">${highlight(r.note || '', q)}</div>
        </li>`).join('');

      const empty = $('empty');
      if (!matches.length) {
        empty.style.display = 'block';
        empty.textContent = allRecipes.length ? 'No recipes match “' + query + '”.' : 'No recipes yet — email one in!';
      } else {
        empty.style.display = 'none';
      }
    }

    $('search').addEventListener('input', (e) => render(e.target.value));
  </script>
</body>
</html>
